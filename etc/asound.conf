# /etc/asound.conf — System-wide ALSA configuration
# Le Potato AML-S905X-CC
#
# NOTE: PipeWire handles mixing, routing, and Bluetooth natively.
# Only set card defaults here; do NOT define custom pcm.* devices
# (pcm.spdif etc. conflict with ALSA's built-in type names and break parsing).

# Default output: HDMI card 0 device 0
# PipeWire overrides this anyway via its ALSA sink.
defaults.pcm.card 0
defaults.pcm.device 0
defaults.ctl.card 0
